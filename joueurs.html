<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Effectif - Racing White Woluwe</title>
<link rel="stylesheet" href="css/style.css">

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    margin: 0;
    padding: 0;
}

header {
    background-color: #222;
    color: white;
    padding: 20px 0;
    text-align: center;
}

nav {
    text-align: center;
    margin: 15px 0;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: #222;
    font-weight: bold;
}

main {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

section {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    margin-bottom: 30px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

th, td {
    padding: 10px;
    text-align: center;
    border: 1px solid #ccc;
    word-wrap: break-word;
}

th {
    background-color: #222;
    color: white;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

/* Joueurs clés en surbrillance */
tr.cle {
    background-color: #ffe680;
    font-weight: bold;
}

/* Input pour modification */
input[type="text"], input[type="number"] {
    width: 90%;
    padding: 4px;
    box-sizing: border-box;
}

/* Bouton sauvegarde */
button {
    margin-top: 15px;
    padding: 10px 20px;
    background-color: #222;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #444;
}

/* Responsive */
@media screen and (max-width: 768px) {
    th, td {
        padding: 6px;
        font-size: 12px;
    }
}
</style>

</head>
<body>

<header>
<h1>Racing White Woluwe</h1>
</header>

<nav>
<a href="joueurs.html">Effectif</a> |
<a href="matchs.html">Calendrier</a> |
<a href="convocations.html">Convocations</a> |
<a href="login.html">Connexion</a>
</nav>

<main>

<section>
<h2>Effectif U19</h2>

<table id="tableJoueurs">
<tr>
<th>Numéro</th>
<th>Nom</th>
<th>Poste</th>
<th>Passes Décisives</th>
<th>Buts Marqués</th>
</tr>
</table>

<button onclick="sauvegarder()">Sauvegarder</button>

</section>

</main>

<script>
// Nombre de joueurs
const nbJoueurs = 23;
const table = document.getElementById("tableJoueurs");

// Fonction pour charger les joueurs depuis localStorage
function charger() {
    for(let i=1;i<=nbJoueurs;i++){
        let nom = localStorage.getItem("joueur_nom"+i) || "";
        let poste = localStorage.getItem("joueur_poste"+i) || "";
        let passes = localStorage.getItem("joueur_passes"+i) || "";
        let buts = localStorage.getItem("joueur_buts"+i) || "";

        // Surligne Tiki-Taka ou capitaine
        let classe = (nom.toLowerCase().includes("tiki-taka") || nom.toLowerCase().includes("capitaine")) ? "cle" : "";

        table.innerHTML += `
        <tr class="${classe}">
            <td>${i}</td>
            <td><input type="text" id="nom${i}" value="${nom}"></td>
            <td><input type="text" id="poste${i}" value="${poste}"></td>
            <td><input type="number" id="passes${i}" value="${passes}" min="0"></td>
            <td><input type="number" id="buts${i}" value="${buts}" min="0"></td>
        </tr>
        `;
    }
}

// Fonction pour sauvegarder les joueurs dans localStorage
function sauvegarder(){
    for(let i=1;i<=nbJoueurs;i++){
        localStorage.setItem("joueur_nom"+i, document.getElementById("nom"+i).value);
        localStorage.setItem("joueur_poste"+i, document.getElementById("poste"+i).value);
        localStorage.setItem("joueur_passes"+i, document.getElementById("passes"+i).value);
        localStorage.setItem("joueur_buts"+i, document.getElementById("buts"+i).value);
    }
    alert("Effectif sauvegardé ✅");
}

charger();
</script>

</body>
</html>
