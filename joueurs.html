<style>
  .terrain {
    background: linear-gradient(to bottom,
      #1a6b35 0%, #1e7a3d 8%, #1a6b35 16%, #1e7a3d 24%,
      #1a6b35 32%, #1e7a3d 40%, #1a6b35 48%, #1e7a3d 56%,
      #1a6b35 64%, #1e7a3d 72%, #1a6b35 80%, #1e7a3d 88%, #1a6b35 100%);
    padding: 30px 24px 36px;
    position: relative;
    border-radius: 0 0 12px 12px;
  }
  .terrain::before {
    content: '';
    position: absolute;
    top: 50%; left: 10%; right: 10%;
    height: 2px;
    background: rgba(255,255,255,0.25);
    transform: translateY(-50%);
  }
  .terrain::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 80px; height: 80px;
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .terrain-header {
    background: #141414;
    color: #e8c840;
    padding: 14px 20px;
    border-radius: 12px 12px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .terrain-header span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: .08em;
  }
  .terrain-badge {
    background: #e8c840;
    color: #141414;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .06em;
  }
  .tactic-label {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin: 14px 0;
  }
  .slot { text-align: center; cursor: pointer; }
  .slot-circle {
    width: 62px; height: 62px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 6px;
    font-size: 0;
    transition: .2s;
    position: relative;
  }
  .slot-circle::after {
    content: '';
    width: 20px; height: 20px;
    background: white;
    border-radius: 50%;
    opacity: 0.85;
  }
  .slot:hover .slot-circle {
    background: rgba(255,255,255,0.28);
    transform: scale(1.08);
  }
  .slot-name {
    font-size: 11px;
    color: white;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,.7);
    min-height: 15px;
    cursor: text;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .slot-name:focus {
    outline: 1px dashed rgba(255,255,255,.8);
    border-radius: 3px;
    background: rgba(0,0,0,.25);
    padding: 0 3px;
    white-space: normal;
  }
  /* Couleurs par ligne */
  .row-att .slot-circle { border-color: #e8c840; background: rgba(232,200,64,0.15); }
  .row-mid .slot-circle { border-color: #60aaff; background: rgba(96,170,255,0.15); }
  .row-def .slot-circle { border-color: #ff7f50; background: rgba(255,127,80,0.15); }
  .row-gk  .slot-circle { border-color: #a0ff80; background: rgba(160,255,128,0.15); }
</style>
</head>
