<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Effectif</title>

<style>
body{
    font-family: Arial;
}

.container{
    background:#ddd;
    padding:20px;
    border-radius:10px;
}

input{
    margin:5px;
    padding:5px;
}

button{
    margin-top:10px;
    padding:10px;
}
</style>

</head>
<body>

<h1>Effectif</h1>

<div class="container">

<div id="joueurs"></div>

<button onclick="sauvegarder()">Sauvegarder</button>

</div>

<script>

const nbJoueurs = 23
const container = document.getElementById("joueurs")

function charger(){
    for(let i=1;i<=nbJoueurs;i++){

        let nom = localStorage.getItem("joueur"+i) || ""

        container.innerHTML += `
        <div>
        Joueur ${i} :
        <input type="text" id="joueur${i}" value="${nom}">
        </div>
        `
    }
}

function sauvegarder(){

    for(let i=1;i<=nbJoueurs;i++){

        let valeur = document.getElementById("joueur"+i).value
        localStorage.setItem("joueur"+i,valeur)

    }

    alert("Effectif sauvegardé ✅")
}

charger()

</script>

</body>
</html>
