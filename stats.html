<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Statistiques - Racing White Woluwe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 900px; margin: 30px auto; padding: 0 20px; }
  @media(max-width:700px){ .stats-grid { grid-template-columns: 1fr; } }
  .chart-card { background: white; border: 1px solid #d4d3cf; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
  .chart-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: .05em; margin-bottom: 16px; border-bottom: 2px solid #e8c840; padding-bottom: 10px; }
  .top-scorer { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #ebe9e4; }
  .top-scorer:last-child { border-bottom: none; }
  .scorer-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; width: 36px; text-align: center; }
  .scorer-name { flex: 1; font-weight: 600; font-size: 15px; }
  .scorer-stats { text-align: right; }
  .scorer-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: #141414; line-height: 1; }
  .scorer-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .06em; }
  .page-header { max-width: 900px; margin: 30px auto 0; padding: 0 20px; }
  .page-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .05em; }
  .page-header p { font-size: 13px; color: #888; margin-top: 4px; }
  .auto-badge { background: #d4f5e4; color: #1f7a4f; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
  .empty-msg { color: #aaa; font-size: 13px; padding: 16px 0; text-align: center; }
  .scorer-avatar { width: 38px; height: 38px; border-radius: 50%; background: #141414; color: #e8c840; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
</style>
</head>
<body>

<header><h1>Racing White Woluwe</h1></header>
<nav>
  <a href="joueurs.html">Effectif</a> |
  <a href="matchs.html">Calendrier</a> |
  <a href="convocations.html">Convocations</a> |
  <a href="stats.html" class="active">Statistiques</a> |
  <a href="login.html">Connexion</a>
</nav>

<div class="page-header">
  <h2>Statistiques U19 <span class="auto-badge">⚡ AUTO</span></h2>
  <p>Mis à jour automatiquement depuis les résultats des matchs</p>
</div>

<div class="stats-grid">
  <div class="chart-card">
    <h3>🏆 Top Buteurs</h3>
    <div id="topButeurs"><p class="empty-msg">Chargement...</p></div>
  </div>
  <div class="chart-card">
    <h3>🎯 Top Passeurs</h3>
    <div id="topPasseurs"><p class="empty-msg">Chargement...</p></div>
  </div>
</div>

<footer>&copy; 2025 Racing White Woluwe — Tous droits réservés</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBtHgQSmZY76kMrZQhClrRo9NuuMgHLbKE",
    authDomain: "racing-white-woluwe.firebaseapp.com",
    projectId: "racing-white-woluwe",
    storageBucket: "racing-white-woluwe.firebasestorage.app",
    messagingSenderId: "443553313021",
    appId: "1:443553313021:web:058e27950c829566624e94"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function initials(nom) {
    return nom.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }

    // Écouter matchs en temps réel
    onSnapshot(doc(db, "matchs", "liste"), (snap) => {
      const matchs = snap.exists() ? (snap.data().matchs || []) : [];
      calculerStats(matchs);
    });
  });

  function calculerStats(matchs) {
    const butsMap = {};
    const passesMap = {};

    matchs.forEach(m => {
      if (!m.score) return;
      if (m.buteurs) m.buteurs.forEach(b => {
        if (!b.nom) return;
        butsMap[b.nom] = (butsMap[b.nom] || 0) + (parseInt(b.nb) || 1);
      });
      if (m.passeurs) m.passeurs.forEach(p => {
        if (!p.nom) return;
        passesMap[p.nom] = (passesMap[p.nom] || 0) + (parseInt(p.nb) || 1);
      });
    });

    const sorted_buts   = Object.entries(butsMap).map(([nom,val])=>({nom,val})).sort((a,b)=>b.val-a.val);
    const sorted_passes = Object.entries(passesMap).map(([nom,val])=>({nom,val})).sort((a,b)=>b.val-a.val);

    renderTop('topButeurs', sorted_buts, 'but');
    renderTop('topPasseurs', sorted_passes, 'passe');
  }

  function renderTop(containerId, list, label) {
    const div = document.getElementById(containerId);
    if (!list.length) {
      div.innerHTML = `<p class="empty-msg">Aucun${label==='but'?'':'e'} ${label} enregistré${label==='but'?'':'e'} dans les matchs.</p>`;
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    div.innerHTML = list.slice(0,10).map((j,i) => `
      <div class="top-scorer">
        <div class="scorer-rank">${medals[i] || (i+1)}</div>
        <div class="scorer-avatar">${initials(j.nom)}</div>
        <div class="scorer-name">${j.nom}</div>
        <div class="scorer-stats">
          <div class="scorer-val">${j.val}</div>
          <div class="scorer-label">${label}${j.val > 1 ? 's' : ''}</div>
        </div>
      </div>`).join('');
  }
</script>
</body>
</html>
