<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Convocations - Racing White Woluwe</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; color: #141414; min-height: 100vh; }

    header { background: #141414; padding: 24px; text-align: center; border-bottom: 4px solid #e8c840; }
    header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: #f5f4f0; letter-spacing: .05em; }

    nav { background: #eeede9; border-bottom: 1px solid #d4d3cf; padding: 0 20px; display: flex; justify-content: center; }
    nav a { display: inline-block; padding: 12px 20px; font-size: 13px; font-weight: 600; color: #555; text-decoration: none; letter-spacing: .05em; border-bottom: 3px solid transparent; transition: .2s; }
    nav a:hover { color: #141414; }
    nav a.active { color: #141414; border-bottom-color: #e8c840; }

    main { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: .05em; margin-bottom: 6px; }
    .page-subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .search-box { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid #d4d3cf; border-radius: 8px; padding: 8px 14px; flex: 1; max-width: 320px; }
    .search-box input { border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 14px; width: 100%; background: transparent; color: #141414; }
    .counter { font-size: 13px; color: #888; }
    .counter span { font-weight: 600; color: #141414; }

    .btn-convoke { background: #141414; color: #e8c840; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer; transition: .2s; }
    .btn-convoke:hover { background: #2a2a2a; }
    .btn-convoke:active { transform: scale(0.97); }
    .btn-convoke:disabled { opacity: 0.4; cursor: not-allowed; }

    .table-wrap { background: white; border-radius: 12px; border: 1px solid #d4d3cf; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.05); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #141414; color: white; }
    thead th { padding: 14px 20px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
    thead th:last-child { text-align: center; }
    tbody tr { border-bottom: 1px solid #ebe9e4; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9f8f4; }
    tbody tr.selected { background: #fffbe8; }
    td { padding: 14px 20px; font-size: 14px; color: #141414; vertical-align: middle; }
    td:last-child { text-align: center; }

    .player-cell { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #141414; color: #e8c840; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .player-name { font-weight: 500; }
    .player-pos { font-size: 11px; color: #888; margin-top: 1px; }
    .email-link { color: #3a6fd8; text-decoration: none; font-size: 13px; }
    .email-link:hover { text-decoration: underline; }
    .checkbox-wrap { display: flex; justify-content: center; }
    input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #141414; }

    .badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; }
    .badge-ok { background: #d4f5e4; color: #1f7a4f; }
    .badge-no { background: #fde8e6; color: #a33426; }
    .badge-pending { background: #f0ede4; color: #666; }

    #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: #141414; color: #e8c840; padding: 13px 28px; border-radius: 8px; font-size: 14px; font-weight: 500; opacity: 0; transition: transform .35s, opacity .35s; z-index: 999; pointer-events: none; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; border-top: 1px solid #e2e1dd; }
  </style>
</head>
<body>

<header>
  <h1>Racing White Woluwe</h1>
</header>

<nav>
  <a href="joueurs.html">Effectif</a> |
  <a href="matchs.html">Calendrier</a> |
  <a href="convocations.html" class="active">Convocations</a> |
  <a href="login.html">Connexion</a>
</nav>

<main>
  <h2 class="page-title">Convocations</h2>
  <p class="page-subtitle">Sélectionnez les joueurs à convoquer pour le prochain match.</p>

  <div class="toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher un joueur…" oninput="filterTable()">
    </div>
    <div class="counter"><span id="selectedCount">0</span> joueur(s) sélectionné(s)</div>
    <button class="btn-convoke" id="convokeBtn" onclick="convoquer()" disabled>✉ Envoyer convocation</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Joueur</th>
          <th>Adresse mail</th>
          <th>Statut</th>
          <th>Sélectionner</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<footer>&copy; 2025 Racing White Woluwe — Tous droits réservés</footer>
<div id="toast"></div>

<script>
  // Charge les joueurs depuis le localStorage (saisis dans joueurs.html)
  function getJoueurs() {
    const liste = [];
    for (let i = 1; i <= 23; i++) {
      const nom = localStorage.getItem('joueur_nom' + i) || '';
      const poste = localStorage.getItem('joueur_poste' + i) || '';
      if (nom.trim() !== '') {
        liste.push({ num: i, nom, poste, email: localStorage.getItem('joueur_email' + i) || '' });
      }
    }
    return liste;
  }

  const statutLabel = {
    ok: '<span class="badge badge-ok">Disponible</span>',
    no: '<span class="badge badge-no">Indisponible</span>',
    pending: '<span class="badge badge-pending">En attente</span>',
  };

  function initials(nom) {
    return nom.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function buildTable(liste) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    if (liste.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888;padding:30px;">Aucun joueur trouvé. Remplissez d\'abord la page Effectif.</td></tr>';
      return;
    }
    liste.forEach(j => {
      const statut = localStorage.getItem('statut_' + j.num) || 'ok';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="player-cell">
          <div class="avatar">${initials(j.nom)}</div>
          <div><div class="player-name">${j.nom}</div><div class="player-pos">${j.poste}</div></div>
        </div></td>
        <td><a class="email-link" href="mailto:${j.email}">${j.email || '—'}</a></td>
        <td>${statutLabel[statut]}</td>
        <td class="checkbox-wrap"><input type="checkbox" onchange="updateCounter()" ${statut === 'no' ? 'disabled' : ''}></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#tableBody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
    updateCounter();
  }

  function updateCounter() {
    const checked = document.querySelectorAll('#tableBody input[type="checkbox"]:checked').length;
    document.getElementById('selectedCount').textContent = checked;
    document.getElementById('convokeBtn').disabled = checked === 0;
    document.querySelectorAll('#tableBody tr').forEach(row => {
      const cb = row.querySelector('input[type="checkbox"]');
      row.classList.toggle('selected', cb && cb.checked);
    });
  }

  function convoquer() {
    const checked = document.querySelectorAll('#tableBody input[type="checkbox"]:checked').length;
    showToast('✓ Convocation envoyée à ' + checked + ' joueur(s) !');
    document.querySelectorAll('#tableBody input[type="checkbox"]').forEach(cb => cb.checked = false);
    updateCounter();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  buildTable(getJoueurs());
</script>

</body>
</html>
