<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Convocations - Racing White Woluwe</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .resp-btn { border: none; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: .2s; }
    .resp-present { background: #d4f5e4; color: #1f7a4f; }
    .resp-absent  { background: #fde8e6; color: #a33426; }
    .resp-present.active { background: #1f7a4f; color: white; }
    .resp-absent.active  { background: #a33426; color: white; }
    .resp-group { display: flex; gap: 6px; justify-content: center; }
    .stats-bar { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: white; border: 1px solid #d4d3cf; border-radius: 10px; padding: 12px 20px; text-align: center; }
    .stat-card .num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #141414; }
    .stat-card .lbl { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .08em; }
    .stat-present .num { color: #1f7a4f; }
    .stat-absent .num  { color: #a33426; }
    .stat-pending .num { color: #888; }
  </style>
</head>
<body>

<header><h1>Racing White Woluwe</h1></header>
<nav>
  <a href="joueurs.html">Effectif</a> |
  <a href="matchs.html">Calendrier</a> |
  <a href="convocations.html" class="active">Convocations</a> |
  <a href="stats.html">Statistiques</a> |
  <a href="login.html">Connexion</a>
</nav>

<main>
  <h2 class="page-title">Convocations</h2>
  <p class="page-subtitle" id="subtitleMatch">Prochain match — confirmez votre présence.</p>

  <!-- Stats rapides -->
  <div class="stats-bar">
    <div class="stat-card stat-present"><div class="num" id="countPresent">0</div><div class="lbl">Présents</div></div>
    <div class="stat-card stat-absent"><div class="num" id="countAbsent">0</div><div class="lbl">Absents</div></div>
    <div class="stat-card stat-pending"><div class="num" id="countPending">0</div><div class="lbl">En attente</div></div>
  </div>

  <!-- Toolbar admin -->
  <div class="toolbar" id="adminToolbar" style="display:none">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher un joueur…" oninput="filterTable()">
    </div>
    <div class="counter"><span id="selectedCount">0</span> sélectionné(s)</div>
    <button class="btn-convoke" id="convokeBtn" onclick="convoquer()" disabled>✉ Envoyer convocation</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Joueur</th>
          <th>Poste</th>
          <th>Statut</th>
          <th id="thAction">Réponse</th>
        </tr>
      </thead>
      <tbody id="tableBody"><tr><td colspan="4" style="text-align:center;padding:20px;color:#888;">Chargement...</td></tr></tbody>
    </table>
  </div>
</main>

<footer>&copy; 2025 Racing White Woluwe — Tous droits réservés</footer>
<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBtHgQSmZY76kMrZQhClrRo9NuuMgHLbKE",
    authDomain: "racing-white-woluwe.firebaseapp.com",
    projectId: "racing-white-woluwe",
    storageBucket: "racing-white-woluwe.firebasestorage.app",
    messagingSenderId: "443553313021",
    appId: "1:443553313021:web:058e27950c829566624e94"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const ADMIN = "mekhalfaioub@gmail.com";

  let currentUser = null;
  let isAdmin = false;
  let joueursList = [];

  function initials(nom) {
    return nom.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;
    isAdmin = user.email === ADMIN;

    if (isAdmin) {
      document.getElementById('adminToolbar').style.display = 'flex';
      document.getElementById('thAction').textContent = 'Sélectionner';
    }

    // Charger joueurs
    const snap = await getDoc(doc(db, "effectif", "joueurs"));
    const data = snap.exists() ? snap.data() : {};
    joueursList = [];
    for (let i = 1; i <= 23; i++) {
      const nom = data['nom'+i] || '';
      const poste = data['poste'+i] || '';
      if (nom.trim()) joueursList.push({ num: i, nom, poste });
    }

    // Écouter les réponses en temps réel
    onSnapshot(doc(db, "convocations", "reponses"), (snap) => {
      const reponses = snap.exists() ? snap.data() : {};
      buildTable(reponses);
      updateStats(reponses);
    });
  });

  function buildTable(reponses) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    if (!joueursList.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888;padding:30px;">Aucun joueur trouvé.</td></tr>';
      return;
    }
    joueursList.forEach(j => {
      const rep = reponses['joueur_' + j.num] || 'pending';
      const badgeMap = {
        present: '<span class="badge badge-ok">✓ Présent</span>',
        absent:  '<span class="badge badge-no">✗ Absent</span>',
        pending: '<span class="badge badge-pending">En attente</span>'
      };
      const tr = document.createElement('tr');

      let actionCell = '';
      if (isAdmin) {
        actionCell = `<td class="checkbox-wrap"><input type="checkbox" onchange="updateCounter()"></td>`;
      } else if (currentUser && currentUser.email) {
        // Chaque joueur connecté peut répondre
        actionCell = `<td>
          <div class="resp-group">
            <button class="resp-btn resp-present ${rep === 'present' ? 'active' : ''}" onclick="repondre(${j.num}, 'present', this)">✓ Présent</button>
            <button class="resp-btn resp-absent ${rep === 'absent' ? 'active' : ''}" onclick="repondre(${j.num}, 'absent', this)">✗ Absent</button>
          </div>
        </td>`;
      } else {
        actionCell = `<td style="text-align:center">—</td>`;
      }

      tr.innerHTML = `
        <td><div class="player-cell">
          <div class="avatar">${initials(j.nom)}</div>
          <div><div class="player-name">${j.nom}</div></div>
        </div></td>
        <td style="color:#888;font-size:13px">${j.poste}</td>
        <td>${badgeMap[rep]}</td>
        ${actionCell}
      `;
      tbody.appendChild(tr);
    });
  }

  function updateStats(reponses) {
    let present = 0, absent = 0, pending = 0;
    joueursList.forEach(j => {
      const rep = reponses['joueur_' + j.num] || 'pending';
      if (rep === 'present') present++;
      else if (rep === 'absent') absent++;
      else pending++;
    });
    document.getElementById('countPresent').textContent = present;
    document.getElementById('countAbsent').textContent = absent;
    document.getElementById('countPending').textContent = pending;
  }

  window.repondre = async function(num, rep, btn) {
    const snap = await getDoc(doc(db, "convocations", "reponses"));
    const data = snap.exists() ? snap.data() : {};
    data['joueur_' + num] = rep;
    await setDoc(doc(db, "convocations", "reponses"), data);
    showToast(rep === 'present' ? '✓ Présence confirmée !' : '✗ Absence enregistrée.');
  };

  window.filterTable = function() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#tableBody tr').forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
    updateCounter();
  };

  window.updateCounter = function() {
    const checked = document.querySelectorAll('#tableBody input[type="checkbox"]:checked').length;
    document.getElementById('selectedCount').textContent = checked;
    document.getElementById('convokeBtn').disabled = checked === 0;
    document.querySelectorAll('#tableBody tr').forEach(row => {
      const cb = row.querySelector('input[type="checkbox"]');
      row.classList.toggle('selected', cb && cb.checked);
    });
  };

  window.convoquer = function() {
    const checked = document.querySelectorAll('#tableBody input[type="checkbox"]:checked').length;
    showToast('✓ Convocation envoyée à ' + checked + ' joueur(s) !');
    document.querySelectorAll('#tableBody input[type="checkbox"]').forEach(cb => cb.checked = false);
    updateCounter();
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }
</script>
</body>
</html>
